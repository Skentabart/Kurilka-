<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Anonymous P2P Chat</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode/minified/html5-qrcode.min.js"></script>
<style>
body { font-family: sans-serif; padding: 20px; }
#chat { border: 1px solid #ccc; height: 300px; overflow-y: auto; padding: 10px; margin-bottom: 10px; }
#message { width: 70%; }
button { margin-left: 5px; margin-bottom: 10px; }
#qr-reader { width: 300px; margin-bottom: 10px; }
#myCodeDisplay { font-weight: bold; font-size: 1.2em; margin-bottom: 10px; }
</style>
</head>
<body>

<h2>Anonymous P2P Chat</h2>
<div id="chat"></div>

<input id="message" placeholder="Type your message" />
<button id="send">Send</button>

<h3>Your code / QR for connection</h3>
<div id="myCodeDisplay"></div> <!-- ďîęŕçűâŕĺě ęîä äë˙ ďîäęëţ÷ĺíč˙ -->
<canvas id="qrcode"></canvas>

<h3>Connect to peer</h3>
<input id="peerCode" placeholder="Enter peer code manually" />
<button id="connect">Connect</button>
<button id="scanQr">Scan QR</button>

<div id="qr-reader" style="display:none;"></div>

<script>
let localConnection, dataChannel;
let signalingSocket = new WebSocket("wss://localhost:8080"); // your signaling server

// Generate unique code
let myCode = Math.random().toString(36).substring(2, 10);
document.getElementById("myCodeDisplay").textContent = "Your connection code: " + myCode;
QRCode.toCanvas(document.getElementById("qrcode"), myCode, function (error) {
  if (error) console.error(error);
});

// WebRTC connection
function createConnection(isCaller, remoteCode) {
  localConnection = new RTCPeerConnection();

  if (isCaller) {
    dataChannel = localConnection.createDataChannel("chat");
    setupDataChannel();
  } else {
    localConnection.ondatachannel = (event) => {
      dataChannel = event.channel;
      setupDataChannel();
    };
  }

  localConnection.onicecandidate = ({candidate}) => {
    if (candidate) {
      signalingSocket.send(JSON.stringify({
        type: "ice",
        candidate,
        to: remoteCode,
        from: myCode
      }));
    }
  };

  if (isCaller) {
    localConnection.createOffer().then(offer => {
      localConnection.setLocalDescription(offer);
      signalingSocket.send(JSON.stringify({ type: "offer", offer, to: remoteCode, from: myCode }));
    });
  }
}

function setupDataChannel() {
  dataChannel.onmessage = e => appendMessage("Peer", e.data);
  dataChannel.onopen = () => appendMessage("System", "Connection established!");
  dataChannel.onclose = () => appendMessage("System", "Connection closed!");
}

function appendMessage(sender, text) {
  let chat = document.getElementById("chat");
  chat.innerHTML += `<b>${sender}:</b> ${text}<br>`;
  chat.scrollTop = chat.scrollHeight;
}

// Send message
document.getElementById("send").onclick = () => {
  let msg = document.getElementById("message").value;
  if (dataChannel && dataChannel.readyState === "open") {
    dataChannel.send(msg);
    appendMessage("You", msg);
    document.getElementById("message").value = "";
  }
};

// Connect to another user manually
document.getElementById("connect").onclick = () => {
  let peerCode = document.getElementById("peerCode").value;
  createConnection(true, peerCode);
};

// Scan QR code for peer
document.getElementById("scanQr").onclick = () => {
  let qrReader = new Html5Qrcode("qr-reader");
  document.getElementById("qr-reader").style.display = "block";

  qrReader.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText, decodedResult) => {
      appendMessage("System", "QR scanned: " + decodedText);
      document.getElementById("peerCode").value = decodedText;
      createConnection(true, decodedText);
      qrReader.stop();
      document.getElementById("qr-reader").style.display = "none";
    },
    (errorMessage) => {}
  );
};

// Receive signaling messages
signalingSocket.onmessage = async (event) => {
  let data = JSON.parse(event.data);
  if (data.to !== myCode) return;

  if (data.type === "offer") {
    createConnection(false, data.from);
    await localConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
    let answer = await localConnection.createAnswer();
    await localConnection.setLocalDescription(answer);
    signalingSocket.send(JSON.stringify({ type: "answer", answer, to: data.from, from: myCode }));
  } else if (data.type === "answer") {
    await localConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
  } else if (data.type === "ice") {
    if (data.candidate) {
      await localConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
    }
  }
};
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Secure P2P Messenger</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#101010;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#top{
background:#1a1a1a;
padding:10px;
}

#code{
width:100%;
padding:10px;
margin-bottom:5px;
}

button{
padding:10px;
margin:2px;
border:none;
background:#333;
color:white;
border-radius:6px;
}

#status{
font-size:12px;
color:#7cff7c;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
background:#222;
padding:10px;
margin:5px 0;
border-radius:10px;
max-width:80%;
}

.me{
background:#2e63ff;
align-self:flex-end;
}

#bottom{
display:flex;
padding:5px;
background:#1a1a1a;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

#qr{
display:none;
margin:auto;
}

#reader{
display:none;
}

</style>

</head>

<body>

<div id="top">

<input id="code" placeholder="connection code">

<br>

<button onclick="createOffer()">Create</button>
<button onclick="createAnswer()">Connect</button>
<button onclick="finish()">Finish</button>

<button onclick="copyCode()">Copy</button>
<button onclick="showQR()">QR</button>
<button onclick="scanQR()">Scan</button>

<div id="status">Not connected</div>

</div>

<canvas id="qr"></canvas>

<div id="reader"></div>

<div id="chat"></div>

<div id="bottom">

<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let pc = new RTCPeerConnection({

iceServers:[
{urls:"stun:stun.l.google.com:19302"}
]

});

let channel;

let connected=false;

function setStatus(t){
status.innerText=t;
}

pc.ondatachannel=e=>{
channel=e.channel;
setupChannel();
};

function setupChannel(){

channel.onopen=()=>{
connected=true;
setStatus("Connected");
};

channel.onmessage=e=>{
addMsg(e.data,false);
};

}

async function createOffer(){

channel = pc.createDataChannel("chat");

setupChannel();

let offer = await pc.createOffer();

await pc.setLocalDescription(offer);

await waitIce();

code.value = btoa(JSON.stringify(pc.localDescription));

}

async function createAnswer(){

let offer = JSON.parse(atob(code.value));

await pc.setRemoteDescription(offer);

let answer = await pc.createAnswer();

await pc.setLocalDescription(answer);

await waitIce();

code.value = btoa(JSON.stringify(pc.localDescription));

}

async function finish(){

let answer = JSON.parse(atob(code.value));

await pc.setRemoteDescription(answer);

}

function waitIce(){

return new Promise(resolve=>{

pc.onicecandidate=e=>{
if(!e.candidate) resolve();
};

});

}

function send(){

if(!connected) return;

let text = msg.value;

channel.send(text);

addMsg(text,true);

msg.value="";

}

function addMsg(t,me){

let div=document.createElement("div");

div.className="msg";

if(me) div.classList.add("me");

div.innerText=t;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function copyCode(){

navigator.clipboard.writeText(code.value);

}

function showQR(){

qr.style.display="block";

QRCode.toCanvas(qr,code.value);

}

function scanQR(){

reader.style.display="block";

const scanner=new Html5Qrcode("reader");

scanner.start(

{facingMode:"environment"},
{fps:10,qrbox:250},

text=>{

code.value=text;

scanner.stop();

reader.style.display="none";

}

);

}

</script>

</body>
</html>

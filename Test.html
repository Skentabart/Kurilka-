<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>P2P Secure Messenger</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#0f0f0f;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#top{
padding:10px;
background:#1a1a1a;
display:flex;
flex-direction:column;
gap:5px;
}

#code{
width:100%;
padding:8px;
}

#buttons{
display:flex;
gap:5px;
}

button{
flex:1;
padding:10px;
border:none;
background:#333;
color:white;
border-radius:6px;
}

#status{
font-size:12px;
color:#8cff8c;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
background:#1f1f1f;
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:80%;
}

.me{
background:#2b5cff;
align-self:flex-end;
}

img,video{
max-width:200px;
border-radius:8px;
margin-top:5px;
}

#bottom{
display:flex;
gap:5px;
padding:6px;
background:#1a1a1a;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

#file{
display:none;
}

#typing{
font-size:12px;
color:#aaa;
padding-left:10px;
}

</style>

</head>

<body>

<div id="top">

<input id="code" placeholder="connection code">

<div id="buttons">

<button onclick="createConn()">Create</button>
<button onclick="joinConn()">Connect</button>
<button onclick="copyCode()">Copy</button>
<button onclick="showQR()">QR</button>

</div>

<div id="status">Not connected</div>

</div>

<canvas id="qr" style="display:none;margin:auto"></canvas>

<div id="chat"></div>

<div id="typing"></div>

<div id="bottom">

<input id="msg" placeholder="message">

<button onclick="sendMsg()">Send</button>

<button onclick="file.click()">📎</button>

<button onclick="voice()">🎤</button>

<input type="file" id="file">

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let pc=new RTCPeerConnection();

let channel;

let connected=false;

let destroyTimer=0;

function setStatus(t){
status.innerText=t;
}

pc.ondatachannel=e=>{
channel=e.channel;
setupChannel();
};

function setupChannel(){

channel.onopen=()=>{
connected=true;
setStatus("Connected");
};

channel.onmessage=e=>{
receive(JSON.parse(e.data));
};

}

async function createConn(){

channel=pc.createDataChannel("chat");

setupChannel();

let offer=await pc.createOffer();

await pc.setLocalDescription(offer);

await waitIce();

code.value=btoa(JSON.stringify(pc.localDescription));

}

async function joinConn(){

let offer=JSON.parse(atob(code.value));

await pc.setRemoteDescription(offer);

let answer=await pc.createAnswer();

await pc.setLocalDescription(answer);

await waitIce();

code.value=btoa(JSON.stringify(pc.localDescription));

}

function waitIce(){

return new Promise(resolve=>{
pc.onicecandidate=e=>{
if(!e.candidate) resolve();
};
});

}

function addMsg(text,me=false){

let div=document.createElement("div");

div.className="msg";

if(me) div.classList.add("me");

div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

if(destroyTimer){

setTimeout(()=>{
div.remove();
},destroyTimer);

}

}

function receive(data){

typing.innerText="";

if(data.type==="text"){
addMsg(data.text);
}

if(data.type==="typing"){
typing.innerText="Peer typing...";
setTimeout(()=>typing.innerText="",1000);
}

if(data.type==="file"){

let div=document.createElement("div");

div.className="msg";

if(data.mime.startsWith("image")){

let img=document.createElement("img");
img.src=data.data;
div.appendChild(img);

}

else if(data.mime.startsWith("video")){

let v=document.createElement("video");
v.src=data.data;
v.controls=true;
div.appendChild(v);

}

else{

let a=document.createElement("a");
a.href=data.data;
a.download=data.name;
a.innerText="Download "+data.name;

div.appendChild(a);

}

chat.appendChild(div);

}

if(data.type==="voice"){

let audio=new Audio(data.data);

audio.controls=true;

chat.appendChild(audio);

}

}

function sendMsg(){

if(!connected) return;

let text=msg.value;

if(!text) return;

channel.send(JSON.stringify({
type:"text",
text:text
}));

addMsg(text,true);

msg.value="";

}

msg.oninput=()=>{

if(channel && connected){

channel.send(JSON.stringify({type:"typing"}));

}

};

file.onchange=()=>{

let f=file.files[0];

let reader=new FileReader();

reader.onload=()=>{

channel.send(JSON.stringify({
type:"file",
name:f.name,
mime:f.type,
data:reader.result
}));

};

reader.readAsDataURL(f);

};

function copyCode(){

navigator.clipboard.writeText(code.value);

}

function showQR(){

qr.style.display="block";

QRCode.toCanvas(qr,code.value);

}

async function voice(){

let stream=await navigator.mediaDevices.getUserMedia({audio:true});

let rec=new MediaRecorder(stream);

let chunks=[];

rec.ondataavailable=e=>chunks.push(e.data);

rec.onstop=()=>{

let blob=new Blob(chunks);

let reader=new FileReader();

reader.onload=()=>{

channel.send(JSON.stringify({
type:"voice",
data:reader.result
}));

};

reader.readAsDataURL(blob);

};

rec.start();

setTimeout(()=>rec.stop(),3000);

}

</script>

</body>
</html>

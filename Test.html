<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure P2P Messenger</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial;
margin:0;
background:#0f0f0f;
color:white;
}

#connect{
padding:20px;
text-align:center;
}

#chat{
display:none;
flex-direction:column;
height:100vh;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.msg{
background:#1c1c1c;
padding:10px;
margin:5px;
border-radius:10px;
}

.me{
background:#0040ff;
}

input,button{
padding:10px;
border-radius:10px;
border:none;
margin:5px;
}

button{
background:#2c7cff;
color:white;
}

#inputRow{
display:flex;
padding:10px;
background:#111;
}

#inputRow input{
flex:1;
}

video,img{
max-width:100%;
border-radius:10px;
}

#qr{
margin-top:20px;
}

textarea{
width:100%;
height:120px;
}

</style>
</head>

<body>

<div id="connect">

<h2>Secure Messenger</h2>

<button onclick="createConnection()">Создать подключение</button>

<div id="qr"></div>

<hr>

<textarea id="pasteOffer" placeholder="Вставьте код подключения"></textarea>

<button onclick="connectByCode()">Подключиться</button>

<br><br>

<input type="file" accept="image/*" capture="environment" id="scanQR" style="display:none">

</div>

<div id="chat">

<div id="messages"></div>

<div id="inputRow">
<input id="text" placeholder="Сообщение">
<button onclick="sendMsg()">Send</button>
<button onclick="sendFile()">File</button>
</div>

<input type="file" id="fileInput" style="display:none">

</div>

<script>

let pc = new RTCPeerConnection()
let channel

pc.ondatachannel = e=>{
channel=e.channel
setupChannel()
}

function setupChannel(){

document.getElementById("chat").style.display="flex"
document.getElementById("connect").style.display="none"

channel.onmessage=e=>{
receive(e.data)
}

}

function createConnection(){

channel = pc.createDataChannel("chat")

setupChannel()

pc.createOffer().then(o=>{
pc.setLocalDescription(o)

setTimeout(()=>{

let code=btoa(JSON.stringify(pc.localDescription))

showQR(code)

},1000)

})

}

function connectByCode(){

let code=document.getElementById("pasteOffer").value

let desc=JSON.parse(atob(code))

pc.setRemoteDescription(desc)

pc.createAnswer().then(a=>{
pc.setLocalDescription(a)

alert("Отправьте ответ обратно")

console.log(btoa(JSON.stringify(a)))

})

}

pc.onicecandidate=e=>{
if(!e.candidate){

let code=btoa(JSON.stringify(pc.localDescription))

console.log(code)

}
}

function showQR(text){

let canvas=document.createElement("canvas")
let size=250
canvas.width=size
canvas.height=size

let ctx=canvas.getContext("2d")

ctx.fillStyle="#fff"
ctx.fillRect(0,0,size,size)

let hash=0

for(let i=0;i<text.length;i++){
hash=text.charCodeAt(i)+((hash<<5)-hash)
}

for(let y=0;y<25;y++){
for(let x=0;x<25;x++){

let v=Math.abs(Math.sin(hash+x*y))*1000

if(v%2>1){
ctx.fillStyle="#000"
ctx.fillRect(x*10,y*10,10,10)
}

}
}

document.getElementById("qr").appendChild(canvas)

}

function sendMsg(){

let text=document.getElementById("text").value

channel.send(JSON.stringify({
type:"text",
data:text
}))

addMsg(text,true)

document.getElementById("text").value=""

}

function sendFile(){

document.getElementById("fileInput").click()

}

document.getElementById("fileInput").onchange=e=>{

let file=e.target.files[0]

let reader=new FileReader()

reader.onload=()=>{

channel.send(JSON.stringify({
type:"file",
name:file.name,
data:reader.result
}))

}

reader.readAsDataURL(file)

}

function receive(data){

let obj=JSON.parse(data)

if(obj.type==="text"){
addMsg(obj.data,false)
}

if(obj.type==="file"){

if(obj.data.startsWith("data:image")){
addMsg('<img src="'+obj.data+'">')
}
else if(obj.data.startsWith("data:video")){
addMsg('<video controls src="'+obj.data+'"></video>')
}
else{
addMsg('<a href="'+obj.data+'" download="'+obj.name+'">'+obj.name+'</a>')
}

}

}

function addMsg(text,me){

let div=document.createElement("div")
div.className="msg"+(me?" me":"")

div.innerHTML=text

document.getElementById("messages").appendChild(div)

}

</script>

</body>
</html>

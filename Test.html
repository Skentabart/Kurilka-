<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>QR P2P Messenger</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#top{
padding:10px;
background:#1b1b1b;
}

button{
padding:10px;
margin:3px;
border:none;
background:#333;
color:white;
border-radius:6px;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
background:#222;
padding:10px;
margin:5px 0;
border-radius:10px;
max-width:80%;
}

.me{
background:#2e63ff;
align-self:flex-end;
}

#bottom{
display:flex;
padding:5px;
background:#1b1b1b;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

#qr{
margin:auto;
}

#reader{
display:none;
}

</style>

</head>

<body>

<div id="top">

<button onclick="createRoom()">Create QR</button>
<button onclick="scanQR()">Scan QR</button>

<div id="status">Not connected</div>

</div>

<canvas id="qr"></canvas>

<div id="reader"></div>

<div id="chat"></div>

<div id="bottom">

<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

</div>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

let roomId=null
let socket=null

let pc=new RTCPeerConnection({
iceServers:[{urls:"stun:stun.l.google.com:19302"}]
})

let channel

function log(t){
status.innerText=t
}

pc.ondatachannel=e=>{
channel=e.channel
setupChannel()
}

function setupChannel(){

channel.onopen=()=>log("Connected")

channel.onmessage=e=>addMsg(e.data,false)

}

function connectSignal(){

socket=new WebSocket("wss://signal.simplewebrtc.com")

socket.onopen=()=>{
socket.send(JSON.stringify({
type:"join",
room:roomId
}))
}

socket.onmessage=async msg=>{

let data=JSON.parse(msg.data)

if(data.offer){

await pc.setRemoteDescription(data.offer)

let answer=await pc.createAnswer()

await pc.setLocalDescription(answer)

socket.send(JSON.stringify({
answer:pc.localDescription,
room:roomId
}))

}

if(data.answer){

await pc.setRemoteDescription(data.answer)

}

if(data.ice){

pc.addIceCandidate(data.ice)

}

}

}

pc.onicecandidate=e=>{
if(e.candidate){
socket.send(JSON.stringify({
ice:e.candidate,
room:roomId
}))
}
}

async function createRoom(){

roomId=Math.random().toString(36).substring(2)

connectSignal()

channel=pc.createDataChannel("chat")

setupChannel()

let offer=await pc.createOffer()

await pc.setLocalDescription(offer)

socket.send(JSON.stringify({
offer:pc.localDescription,
room:roomId
}))

QRCode.toCanvas(qr,roomId)

}

function scanQR(){

reader.style.display="block"

const scanner=new Html5Qrcode("reader")

scanner.start(
{facingMode:"environment"},
{fps:10,qrbox:250},

text=>{

roomId=text

scanner.stop()

reader.style.display="none"

connectSignal()

}

)

}

function send(){

if(!channel) return

let text=msg.value

channel.send(text)

addMsg(text,true)

msg.value=""

}

function addMsg(t,me){

let div=document.createElement("div")

div.className="msg"

if(me) div.classList.add("me")

div.innerText=t

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

</script>

</body>
</html>

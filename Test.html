<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>P2P Messenger</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

#top{
padding:10px;
background:#1c1c1c;
}

#code{
width:100%;
padding:10px;
margin-bottom:5px;
}

button{
padding:10px;
margin:2px;
border:none;
background:#333;
color:white;
border-radius:6px;
}

#chat{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
background:#222;
padding:10px;
border-radius:10px;
margin:5px 0;
max-width:80%;
}

.me{
background:#2e63ff;
align-self:flex-end;
}

#bottom{
display:flex;
padding:5px;
background:#1c1c1c;
}

#msg{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

#qr{
display:none;
width:250px;
margin:auto;
}

#reader{
display:none;
width:100%;
}

</style>

</head>

<body>

<div id="top">

<input id="code" placeholder="connection code">

<br>

<button onclick="createOffer()">Create connection</button>
<button onclick="createAnswer()">Connect</button>
<button onclick="copyCode()">Copy code</button>
<button onclick="showQR()">Show QR</button>
<button onclick="scanQR()">Scan QR</button>

<div id="status">Not connected</div>

</div>

<canvas id="qr"></canvas>

<div id="reader"></div>

<div id="chat"></div>

<div id="bottom">

<input id="msg" placeholder="message">

<button onclick="send()">Send</button>

</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<script>

let pc=new RTCPeerConnection();

let channel;

let connected=false;

function log(t){
status.innerText=t;
}

pc.ondatachannel=e=>{
channel=e.channel;
setupChannel();
};

function setupChannel(){

channel.onopen=()=>{
connected=true;
log("Connected");
};

channel.onmessage=e=>{
addMsg(e.data,false);
};

}

async function createOffer(){

channel=pc.createDataChannel("chat");

setupChannel();

let offer=await pc.createOffer();

await pc.setLocalDescription(offer);

await waitIce();

let codeStr=btoa(JSON.stringify(pc.localDescription));

code.value=codeStr;

}

async function createAnswer(){

let offer=JSON.parse(atob(code.value));

await pc.setRemoteDescription(offer);

let answer=await pc.createAnswer();

await pc.setLocalDescription(answer);

await waitIce();

let codeStr=btoa(JSON.stringify(pc.localDescription));

code.value=codeStr;

}

function waitIce(){

return new Promise(resolve=>{

pc.onicecandidate=e=>{

if(!e.candidate) resolve();

};

});

}

function send(){

if(!connected) return;

let text=msg.value;

channel.send(text);

addMsg(text,true);

msg.value="";

}

function addMsg(t,me){

let div=document.createElement("div");

div.className="msg";

if(me) div.classList.add("me");

div.innerText=t;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

function copyCode(){

navigator.clipboard.writeText(code.value);

}

function showQR(){

qr.style.display="block";

QRCode.toCanvas(qr,code.value);

}

function scanQR(){

reader.style.display="block";

const scanner=new Html5Qrcode("reader");

scanner.start(
{facingMode:"environment"},
{
fps:10,
qrbox:250
},
text=>{

code.value=text;

scanner.stop();

reader.style.display="none";

}
);

}

</script>

</body>
</html>
